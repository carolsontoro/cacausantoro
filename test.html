<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha com sabedoria...</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      margin: 0;
      background: #800020;
      color: #ffb6c1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    h1 {
      margin-bottom: 20px;
      text-align: center;
    }

    #gameArea {
      position: relative;
      width: 500px;
      height: 300px;
      border: 2px dashed #ffb6c1;
    }

    button {
      position: absolute;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: black;
      color: #ffb6c1;
      cursor: pointer;
    }

    #dois {
      left: 50px;
      top: 50px;
    }

    #presente {
      right: 50px;
      bottom: 50px;
    }

    /* CARTA */
    .carta {
      position: absolute;
      bottom: -200px;
      width: 220px;
      height: 140px;
      background: white;
      color: black;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10px;
      opacity: 0;
      transition: all 0.8s ease;
    }

    .carta.show {
      bottom: 50px;
      opacity: 1;
    }
  </style>
</head>
<body>

  <h1>🎯 Desafio: Clique no presente!</h1>
  <p>Mas cuidado com os 2 reais 😈</p>

  <div id="gameArea">
    <button id="dois">2 reais</button>
    <button id="presente">🎁 Presente</button>

    <div class="carta" id="carta">
      💖 Parabéns!<br><br>
      Você ganhou uma<br>
      ruiva, tagarela,<br>
      ciumenta e nerd 😌
    </div>
  </div>

  <script>
    const dois = document.getElementById('dois');
    const presente = document.getElementById('presente');
    const area = document.getElementById('gameArea');
    const carta = document.getElementById('carta');

    function moverDois() {
      const rect = area.getBoundingClientRect();
      const btnRect = dois.getBoundingClientRect();

      const maxX = rect.width - btnRect.width;
      const maxY = rect.height - btnRect.height;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      dois.style.left = x + "px";
      dois.style.top = y + "px";
    }

    // botão foge ao aproximar
    dois.addEventListener('mouseenter', moverDois);

    // também fica se mexendo sozinho (modo caos 😈)
    setInterval(moverDois, 1200);

    // clicar no presente ganha
    presente.addEventListener('click', () => {
      carta.classList.add('show');
    });
  </script>

</body>
</html>
